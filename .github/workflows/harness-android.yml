name: Harness Android

concurrency:
  group: harness-android-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

on:
  workflow_dispatch:
    inputs:
      device_api_level:
        description: "Android API level for the emulator"
        required: false
        default: "35"
        type: string
      device_arch:
        description: "Device architecture (x86_64, arm64-v8a)"
        required: false
        default: "x86_64"
        type: choice
        options:
          - x86_64
          - arm64-v8a
      device_profile:
        description: "Device profile"
        required: false
        default: "pixel_7"
        type: string
      avd_name:
        description: "AVD name"
        required: false
        default: "Pixel_8_API_35"
        type: string
  push:
    branches:
      - main
    paths:
      - ".github/workflows/harness-android.yml"
      - "example/android/**"
      - "packages/react-native-nitro-fetch/android/**"
      - "packages/react-native-nitro-text-decoder/android/**"
      - "packages/react-native-nitro-text-decoder/ios/**"
      - "packages/react-native-nitro-websockets/android/**"
      - "packages/react-native-nitro-websockets/ios/**"
      - "packages/react-native-nitro-fetch/src/**"
      - "packages/react-native-nitro-text-decoder/src/**"
      - "packages/react-native-nitro-websockets/src/**"
      - "packages/react-native-nitro-fetch/nitrogen/**"
      - "packages/react-native-nitro-text-decoder/nitrogen/**"
      - "packages/react-native-nitro-websockets/nitrogen/**"
      - "**/bun.lock"
      - "**/react-native.config.js"
      - "example/__tests__/**"
      - "example/test-utils/**"
      - "example/rn-harness.config.mjs"
      - "test-server/**"
  pull_request:
    paths:
      - ".github/workflows/harness-android.yml"
      - "example/android/**"
      - "packages/react-native-nitro-fetch/android/**"
      - "packages/react-native-nitro-text-decoder/android/**"
      - "packages/react-native-nitro-text-decoder/ios/**"
      - "packages/react-native-nitro-websockets/android/**"
      - "packages/react-native-nitro-websockets/ios/**"
      - "packages/react-native-nitro-fetch/src/**"
      - "packages/react-native-nitro-text-decoder/src/**"
      - "packages/react-native-nitro-websockets/src/**"
      - "packages/react-native-nitro-fetch/nitrogen/**"
      - "packages/react-native-nitro-text-decoder/nitrogen/**"
      - "packages/react-native-nitro-websockets/nitrogen/**"
      - "**/bun.lock"
      - "**/react-native.config.js"
      - "example/__tests__/**"
      - "example/test-utils/**"
      - "example/rn-harness.config.mjs"
      - "test-server/**"

env:
  DEVICE_API_LEVEL: ${{ github.event.inputs.device_api_level || '35' }}
  DEVICE_ARCH: ${{ github.event.inputs.device_arch || 'x86_64' }}
  DEVICE_PROFILE: ${{ github.event.inputs.device_profile || 'pixel_7' }}
  AVD_NAME: ${{ github.event.inputs.avd_name || 'Pixel_8_API_35' }}

jobs:
  harness_android:
    name: Harness Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Reclaim disk space
        uses: AdityaGarg8/remove-unwanted-software@v5
        with:
          remove-dotnet: true
          remove-haskell: true
          remove-codeql: true
          remove-docker-images: true

      - uses: oven-sh/setup-bun@v2

      - name: Install npm dependencies
        run: bun install

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: 17
          java-package: jdk

      - name: Restore Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            example/android/.gradle
            example/android/app/.cxx
          key: ${{ runner.os }}-gradle-${{ env.DEVICE_ARCH }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ env.DEVICE_ARCH }}-
            ${{ runner.os }}-gradle-

      - name: Build Android app
        working-directory: example/android
        run: ./gradlew :app:assembleDebug --no-daemon --build-cache -PreactNativeArchitectures=${{ env.DEVICE_ARCH }}

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls /dev/kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ env.DEVICE_API_LEVEL }}-${{ env.DEVICE_ARCH }}

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.DEVICE_API_LEVEL }}
          arch: ${{ env.DEVICE_ARCH }}
          profile: ${{ env.DEVICE_PROFILE }}
          disk-size: 1G
          heap-size: 1G
          force-avd-creation: false
          avd-name: ${{ env.AVD_NAME }}
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: echo "Generated AVD snapshot for caching."

      - name: Run Harness E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          working-directory: example
          api-level: ${{ env.DEVICE_API_LEVEL }}
          arch: ${{ env.DEVICE_ARCH }}
          force-avd-creation: false
          avd-name: ${{ env.AVD_NAME }}
          disable-animations: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          # android-emulator-runner runs each script line in its own `sh -c` and
          # waits for the script's output pipe to close, so everything is one
          # physical line and the test server's output is redirected off the pipe
          # and the server is killed after the run — otherwise the still-listening
          # server holds the pipe open and the step hangs. Emulator reaches the
          # host via 10.0.2.2.
          script: |
            bun ../test-server/server.mjs >/tmp/test-server.log 2>&1 </dev/null & SRV=$!; for i in $(seq 1 30); do curl -sf http://127.0.0.1:9876/get >/dev/null 2>&1 && break; sleep 1; done; curl -sf http://127.0.0.1:9876/get >/dev/null || { echo "test server failed to start"; cat /tmp/test-server.log; exit 1; }; adb install -r "./android/app/build/outputs/apk/debug/app-debug.apk"; bun run test:harness --harnessRunner android; ec=$?; kill $SRV 2>/dev/null || true; exit $ec

      - name: Stop Gradle Daemon
        working-directory: example/android
        run: ./gradlew --stop
